  </div>
</div>

<script>
(function() {
  'use strict';

  // ========================================
  // 页面加载完成后隐藏加载动画
  // ========================================
  function hidePageLoader() {
    const loader = document.getElementById('pageLoader');
    if (loader) {
      loader.style.opacity = '0';
      loader.style.visibility = 'hidden';
      setTimeout(function() {
        loader.remove();
      }, 500);
    }
  }
  
  if (document.readyState === 'complete') {
    setTimeout(hidePageLoader, 100);
  } else {
    window.addEventListener('load', function() {
      setTimeout(hidePageLoader, 300);
    });
    // 兜底：3秒后强制隐藏
    setTimeout(hidePageLoader, 3000);
  }

  // ========================================
  // 鼠标点击特效 - 爱心爆炸
  // ========================================
  const colors = ['#6366f1', '#ec4899', '#10b981', '#f59e0b', '#3b82f6', '#ef4444'];
  
  function createClickEffect(x, y) {
    const count = 8;
    for (let i = 0; i < count; i++) {
      const particle = document.createElement('div');
      const angle = (Math.PI * 2 * i) / count;
      const velocity = 3 + Math.random() * 3;
      const color = colors[Math.floor(Math.random() * colors.length)];
      
      particle.style.cssText = `
        position: fixed;
        left: ${x}px;
        top: ${y}px;
        width: 8px;
        height: 8px;
        background: ${color};
        border-radius: 50%;
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 6px ${color};
      `;
      
      document.body.appendChild(particle);
      
      let vx = Math.cos(angle) * velocity;
      let vy = Math.sin(angle) * velocity;
      let opacity = 1;
      let scale = 1;
      
      function animate() {
        x += vx;
        y += vy;
        vy += 0.1; // 重力
        opacity -= 0.02;
        scale -= 0.01;
        
        if (opacity <= 0) {
          particle.remove();
          return;
        }
        
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        particle.style.opacity = opacity;
        particle.style.transform = `translate(-50%, -50%) scale(${Math.max(0, scale)})`;
        
        requestAnimationFrame(animate);
      }
      
      requestAnimationFrame(animate);
    }
  }

  document.addEventListener('click', function(e) {
    // 避免在按钮、链接等交互元素上触发太多粒子
    if (e.target.closest('a, button, input, textarea, .search-popup, .copy-btn')) return;
    createClickEffect(e.clientX, e.clientY);
  });

  // ========================================
  // 标题动态切换效果
  // ========================================
  const originalTitle = document.title;
  const titleMessages = [
    { title: '👋 欢迎回来！', timeout: 2000 },
    { title: originalTitle, timeout: 0 }
  ];
  
  let titleIndex = 0;
  let titleTimer = null;

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      clearTimeout(titleTimer);
      document.title = '💔 等等我呀~';
    } else {
      document.title = '🎉 欢迎回来！';
      titleTimer = setTimeout(function() {
        document.title = originalTitle;
      }, 2000);
    }
  });

  // ========================================
  // 平滑滚动增强
  // ========================================
  document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
    anchor.addEventListener('click', function(e) {
      const href = this.getAttribute('href');
      if (href === '#' || href.length <= 1) return;
      
      const target = document.querySelector(href);
      if (target) {
        e.preventDefault();
        const headerOffset = 80;
        const elementPosition = target.getBoundingClientRect().top;
        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
        
        window.scrollTo({
          top: offsetPosition,
          behavior: 'smooth'
        });
      }
    });
  });

  // ========================================
  // 图片懒加载占位符效果
  // ========================================
  if ('IntersectionObserver' in window) {
    const imageObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          const img = entry.target;
          img.classList.add('img-loaded');
          imageObserver.unobserve(img);
        }
      });
    }, {
      rootMargin: '50px 0px'
    });

    document.querySelectorAll('img').forEach(function(img) {
      imageObserver.observe(img);
    });
  }

  // ========================================
  // 滚动显示动画
  // ========================================
  setTimeout(function() {
    document.querySelectorAll('.post').forEach(function(post, index) {
      post.style.opacity = '1';
      post.style.transform = 'translateY(0)';
      post.style.transition = `opacity 0.6s ease ${index * 0.1}s, transform 0.6s ease ${index * 0.1}s`;
    });
  }, 100);

  // ========================================
  // 代码块复制成功提示增强
  // ========================================
  const originalCopy = document.querySelector('.copy-btn');
  if (originalCopy) {
    const style = document.createElement('style');
    style.textContent = `
      .copy-btn.copied {
        background: #10b981 !important;
        color: white !important;
      }
      .copy-btn.copied::after {
        content: '已复制!';
        position: absolute;
        right: 100%;
        margin-right: 8px;
        padding: 4px 8px;
        background: #10b981;
        color: white;
        border-radius: 4px;
        font-size: 12px;
        white-space: nowrap;
      }
    `;
    document.head.appendChild(style);
  }

  // ========================================
  // 阅读进度条增强
  // ========================================
  function updateReadingProgress() {
    const progressBar = document.querySelector('.reading-progress-bar');
    if (!progressBar) return;
    
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrolled = window.scrollY;
    const progress = Math.max(0, Math.min(100, (scrolled / docHeight) * 100));
    
    progressBar.style.width = progress + '%';
  }

  window.addEventListener('scroll', updateReadingProgress, { passive: true });
  updateReadingProgress();

  // ========================================
  // 导航栏滚动效果
  // ========================================
  let lastScroll = 0;
  const header = document.querySelector('.header-inner');
  
  window.addEventListener('scroll', function() {
    const currentScroll = window.scrollY;
    
    if (header) {
      if (currentScroll > 100) {
        header.style.boxShadow = '0 4px 20px rgba(0, 0, 0, 0.08)';
      } else {
        header.style.boxShadow = 'none';
      }
    }
    
    lastScroll = currentScroll;
  }, { passive: true });

  // ========================================
  // 暗黑模式切换按钮增强
  // ========================================
  const darkmodeToggle = document.querySelector('.darkmode-toggle');
  if (darkmodeToggle) {
    darkmodeToggle.addEventListener('click', function() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      
      // 添加切换动画
      document.body.style.transition = 'background-color 0.3s ease, color 0.3s ease';
      setTimeout(function() {
        document.body.style.transition = '';
      }, 300);
    });
  }

  // ========================================
  // 控制台彩蛋
  // ========================================
  console.log('%c 🚀 Mr Jia\'s Blog ', 'background: linear-gradient(135deg, #6366f1, #ec4899); color: white; font-size: 20px; font-weight: bold; padding: 10px 20px; border-radius: 8px; margin: 20px 0;');
  console.log('%c 欢迎来到我的技术博客！', 'color: #6366f1; font-size: 14px; font-weight: 500;');
  console.log('%c 如果你对代码感兴趣，欢迎访问我的 GitHub: https://github.com/jzl00', 'color: #6b7280; font-size: 12px;');

  // ========================================
  // Pjax 页面切换后重新初始化
  // ========================================
  document.addEventListener('pjax:success', function() {
    // 重新绑定事件
    document.querySelectorAll('.post').forEach(function(post, index) {
      post.style.opacity = '0';
      post.style.transform = 'translateY(30px)';
      post.style.transition = `opacity 0.6s ease ${index * 0.1}s, transform 0.6s ease ${index * 0.1}s`;
      setTimeout(function() {
        post.style.opacity = '1';
        post.style.transform = 'translateY(0)';
      }, 50);
    });
    
    updateReadingProgress();
  });

})();
</script>


<script>
(function() {
  'use strict';
  
  // 检测是否为移动设备，移动端不启用
  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) return;
  
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:9998;';
  document.body.appendChild(canvas);
  
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;
  let particles = [];
  let mouseX = 0;
  let mouseY = 0;
  
  window.addEventListener('resize', function() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });
  
  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: mouseX,
        y: mouseY,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 1,
        size: Math.random() * 3 + 1,
        color: Math.random() > 0.5 ? '#6366f1' : '#ec4899'
      });
    }
  });
  
  function animate() {
    ctx.clearRect(0, 0, width, height);
    
    particles = particles.filter(function(p) {
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.02;
      p.size *= 0.98;
      
      if (p.life <= 0) return false;
      
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life * 0.6;
      ctx.fill();
      
      return true;
    });
    
    requestAnimationFrame(animate);
  }
  
  animate();
})();
</script>
